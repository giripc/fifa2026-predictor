<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>⚽ FIFA 2026 Predictor</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0a1628;color:#eee;min-height:100vh;padding:24px 20px}
    .page-header{text-align:center;margin-bottom:28px}
    .page-header h1{color:#f0c030;font-size:1.8rem;margin-bottom:4px}
    .page-header .sub{color:#aaa;font-size:.9rem}

    /* Auth cards */
    .auth-wrap{display:flex;justify-content:center}
    .card{background:#122040;border-radius:12px;padding:28px;width:100%;max-width:460px}
    label{display:block;margin-top:14px;font-size:.85rem;color:#bbb}
    input,select{width:100%;padding:10px;margin-top:4px;border:1px solid #2a4070;border-radius:6px;
      background:#0d1f3c;color:#eee;font-size:.95rem}
    input:focus,select:focus{outline:none;border-color:#f0c030}
    .btn{margin-top:20px;width:100%;padding:11px;background:#f0c030;color:#0a1628;font-weight:bold;
      font-size:1rem;border:none;border-radius:6px;cursor:pointer}
    .btn:hover{background:#f5d060}
    .btn-sec{background:#1e3a6e;color:#eee;margin-top:10px}
    .btn-sec:hover{background:#2a4e8c}
    .btn-sm{padding:7px 16px;font-size:.85rem;border:none;border-radius:6px;cursor:pointer;
      background:#1e3a6e;color:#eee;margin-top:0}
    .btn-sm:hover{background:#2a4e8c}
    .error{color:#f87171;font-size:.85rem;margin-top:10px}
    .success{color:#6ee7b7;font-size:.85rem;margin-top:10px}
    .hidden{display:none}

    /* Tab bar */
    .tab-bar{display:flex;gap:8px;margin-bottom:24px}
    .tab{padding:9px 22px;border-radius:8px;border:1px solid #2a4070;cursor:pointer;
      font-size:.9rem;background:transparent;color:#aaa}
    .tab.active{background:#f0c030;color:#0a1628;font-weight:bold;border-color:#f0c030}

    /* Predict layout */
    .predict-header{display:flex;justify-content:space-between;align-items:center;
      background:#122040;border-radius:10px;padding:14px 20px;margin-bottom:24px;flex-wrap:wrap;gap:10px}
    .predict-header .welcome{color:#6ee7b7;font-size:1rem;font-weight:bold}
    .predict-header .sub{color:#aaa;font-size:.82rem;margin-top:2px}
    .groups-badge{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .badge{background:#1e3a6e;color:#6ee7b7;font-size:.75rem;padding:3px 10px;border-radius:20px}

    .stage-header{color:#f0c030;font-size:.82rem;font-weight:bold;text-transform:uppercase;
      letter-spacing:.08em;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid #2a4070}

    .match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .match-card{background:#122040;border:1px solid #2a4070;border-radius:10px;padding:16px;
      display:flex;flex-direction:column;gap:10px;transition:border-color .2s}
    .match-card:hover{border-color:#f0c030}
    .match-meta{font-size:.75rem;color:#888}
    .match-teams{font-size:.95rem;font-weight:bold;color:#fff;display:flex;
      justify-content:space-between;align-items:center;gap:6px}
    .match-teams .team{flex:1;text-align:center}
    .match-teams .vs{color:#555;font-size:.8rem;flex:none}
    .score-row{display:flex;align-items:center;gap:8px;justify-content:center}
    .score-row input{text-align:center;font-size:1.1rem;font-weight:bold;width:52px;padding:8px 4px;
      border:1px solid #2a4070;border-radius:6px;background:#0d1f3c;color:#f0c030}
    .score-row input:focus{outline:none;border-color:#f0c030}
    .score-row .dash{color:#555;font-size:1rem}
    .save-btn{padding:7px 16px;background:#1e3a6e;color:#eee;border:none;border-radius:6px;
      cursor:pointer;font-size:.85rem;white-space:nowrap}
    .save-btn:hover{background:#f0c030;color:#0a1628}
    .save-btn:disabled{opacity:.5;cursor:default}
    .status-line{font-size:.75rem;min-height:16px;color:#6ee7b7;text-align:center}
    .status-line.err{color:#f87171}

    /* Leaderboard */
    .lb-controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .lb-controls label{margin:0;font-size:.85rem;color:#bbb}
    .lb-controls select{width:auto;min-width:180px}
    .lb-table{width:100%;border-collapse:collapse;font-size:.9rem}
    .lb-table th{background:#1a3060;color:#f0c030;padding:10px 14px;text-align:left;
      font-size:.78rem;text-transform:uppercase;letter-spacing:.05em}
    .lb-table td{padding:10px 14px;border-bottom:1px solid #1a2f55}
    .lb-table tr:hover td{background:#122040}
    .rank-1{color:#f0c030;font-weight:bold;font-size:1.1rem}
    .rank-2{color:#c0c0c0;font-weight:bold}
    .rank-3{color:#cd7f32;font-weight:bold}
    .score-pts{font-weight:bold;color:#6ee7b7}
    .highlight-me td{background:#0d2545 !important}
    .lb-table tr.breakdown-row td{background:#0a1628;padding:6px 14px 10px 40px;border-bottom:1px solid #1a2f55}
    .lb-table tr.breakdown-row:hover td{background:#0a1628}
    .breakdown-chips{display:flex;flex-wrap:wrap;gap:6px}
    .chip{font-size:.75rem;padding:3px 10px;border-radius:20px;font-weight:500}
    .chip-exact{background:#14532d;color:#6ee7b7}
    .chip-result{background:#1e3a6e;color:#93c5fd}
    .chip-wrong{background:#3b1515;color:#f87171}
    .chip-miss{background:#2a2a2a;color:#888}
    .lb-name-btn{background:none;border:none;color:inherit;cursor:pointer;text-align:left;font-size:inherit;padding:0}
    .lb-name-btn:hover{text-decoration:underline}

    #loading{text-align:center;padding:40px;color:#aaa;font-size:1rem}
  </style>
</head>
<body>

<div class="page-header">
  <h1>⚽ FIFA 2026 Predictor</h1>
  <p class="sub">Predict scores before each match kicks off</p>
</div>

<!-- Step 1: Email -->
<div class="auth-wrap">
<div id="stepEmail" class="card">
  <label>Your Email
    <input id="email" type="email" placeholder="you@example.com"/>
  </label>
  <button class="btn" onclick="checkEmail()">Continue →</button>
  <div id="emailErr" class="error"></div>
</div>
</div>

<!-- Step 2: Register -->
<div class="auth-wrap">
<div id="stepRegister" class="card hidden">
  <div class="success">New here! Fill in your details to join.</div>
  <label>Full Name   <input id="regName" placeholder="Your name"/></label>
  <label>Invite Code <input id="regCode" placeholder="Ask your group admin"/></label>
  <button class="btn" onclick="register()">Join & Start Predicting →</button>
  <button class="btn btn-sec" onclick="showStep('stepEmail')">← Back</button>
  <div id="regErr" class="error"></div>
</div>
</div>

<!-- Step 3: Join additional group -->
<div class="auth-wrap">
<div id="stepJoin" class="card hidden">
  <div class="success">Enter an invite code to join another group.</div>
  <label>Invite Code <input id="joinCode" placeholder="Ask your group admin"/></label>
  <button class="btn" onclick="joinGroup()">Join Group →</button>
  <button class="btn btn-sec" onclick="showApp()">← Cancel</button>
  <div id="joinErr" class="error"></div>
</div>
</div>

<!-- Step 4: Main app (predict + leaderboard) -->
<div id="stepApp" class="hidden">
  <!-- Header -->
  <div class="predict-header">
    <div>
      <div id="welcomeMsg" class="welcome"></div>
      <div class="sub">Save your predictions before kickoff</div>
      <div id="groupBadges" class="groups-badge"></div>
    </div>
    <button class="btn-sm" onclick="showStep('stepJoin')">+ Join a Group</button>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab active" id="tabPredict" onclick="switchTab('predict')">⚽ Predict</button>
    <button class="tab" id="tabLeaderboard" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
  </div>

  <!-- Predict panel -->
  <div id="panelPredict">
    <div id="loading">Loading matches…</div>
    <div id="matchList"></div>
  </div>

  <!-- Leaderboard panel -->
  <div id="panelLeaderboard" class="hidden">
    <div class="lb-controls">
      <label>Group
        <select id="lbGroupSelect" onchange="loadLeaderboard()">
          <option value="">🌍 Global (all groups)</option>
        </select>
      </label>
    </div>
    <div id="lbLoading" style="text-align:center;padding:40px;color:#aaa">Loading…</div>
    <table class="lb-table hidden" id="lbTable">
      <thead>
        <tr>
          <th>#</th><th>Name</th><th id="lbGroupsHeader">Groups</th><th>Points</th>
        </tr>
      </thead>
      <tbody id="lbBody"></tbody>
    </table>
    <div id="lbEmpty" class="hidden" style="text-align:center;padding:40px;color:#aaa">
      No completed matches yet — check back after the first game!
    </div>
  </div>
</div>

<script>
  var participant = null;
  var matchesLoaded = false;
  var lbLoaded = false;

  // ── Navigation ──────────────────────────────────────────────

  function showStep(id) {
    ['stepEmail','stepRegister','stepJoin','stepApp'].forEach(function(s) {
      document.getElementById(s).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
  }

  function showApp() {
    showStep('stepApp');
    refreshGroupBadges();
  }

  function switchTab(tab) {
    document.getElementById('tabPredict').classList.toggle('active', tab === 'predict');
    document.getElementById('tabLeaderboard').classList.toggle('active', tab === 'leaderboard');
    document.getElementById('panelPredict').classList.toggle('hidden', tab !== 'predict');
    document.getElementById('panelLeaderboard').classList.toggle('hidden', tab !== 'leaderboard');
    if (tab === 'leaderboard' && !lbLoaded) {
      populateGroupSelect();
    }
  }

  // ── Auth ────────────────────────────────────────────────────

  function checkEmail() {
    var email = document.getElementById('email').value.trim();
    if (!email) { document.getElementById('emailErr').textContent = 'Please enter your email.'; return; }
    document.getElementById('emailErr').textContent = 'Checking…';
    google.script.run
      .withSuccessHandler(function(p) {
        document.getElementById('emailErr').textContent = '';
        if (p) { participant = p; showApp(); loadMatches(); }
        else   { showStep('stepRegister'); }
      })
      .withFailureHandler(function(e) {
        document.getElementById('emailErr').textContent = e.message;
      })
      .lookupParticipant(email);
  }

  function register() {
    var name  = document.getElementById('regName').value.trim();
    var code  = document.getElementById('regCode').value.trim();
    var email = document.getElementById('email').value.trim();
    if (!name || !code) { document.getElementById('regErr').textContent = 'All fields required.'; return; }
    document.getElementById('regErr').textContent = 'Registering…';
    google.script.run
      .withSuccessHandler(function(r) {
        if (r.error) { document.getElementById('regErr').textContent = r.error; return; }
        google.script.run
          .withSuccessHandler(function(p) { participant = p; showApp(); loadMatches(); })
          .lookupParticipant(email);
      })
      .withFailureHandler(function(e) {
        document.getElementById('regErr').textContent = e.message;
      })
      .registerParticipant(name, email, code);
  }

  function joinGroup() {
    var code = document.getElementById('joinCode').value.trim();
    if (!code) { document.getElementById('joinErr').textContent = 'Enter an invite code.'; return; }
    document.getElementById('joinErr').textContent = 'Joining…';
    google.script.run
      .withSuccessHandler(function(r) {
        if (r.error) { document.getElementById('joinErr').textContent = r.error; return; }
        participant.groups.push(r.groupName);
        document.getElementById('joinCode').value = '';
        document.getElementById('joinErr').textContent = '';
        showApp();
      })
      .withFailureHandler(function(e) {
        document.getElementById('joinErr').textContent = e.message;
      })
      .joinGroup(participant.id, code);
  }

  function refreshGroupBadges() {
    document.getElementById('welcomeMsg').textContent = 'Welcome, ' + participant.name + '! 👋';
    var badges = participant.groups.map(function(g) {
      return '<span class="badge">' + g + '</span>';
    }).join('');
    document.getElementById('groupBadges').innerHTML = badges;
  }

  // ── Predictions ─────────────────────────────────────────────

  function loadMatches() {
    if (matchesLoaded) return;
    google.script.run
      .withSuccessHandler(function(matches) {
        google.script.run
          .withSuccessHandler(function(preds) { renderMatches(matches, preds); matchesLoaded = true; })
          .getMyPredictions(participant.id);
      })
      .getUpcomingMatches();
  }

  function renderMatches(matches, preds) {
    document.getElementById('loading').style.display = 'none';
    var container = document.getElementById('matchList');
    if (!matches.length) {
      container.innerHTML = '<p style="color:#aaa;text-align:center;margin-top:40px;font-size:1rem">No upcoming matches available right now.</p>';
      return;
    }

    var byStage = {}, stageOrder = [];
    matches.forEach(function(m) {
      var s = m.stage || 'Other';
      if (!byStage[s]) { byStage[s] = []; stageOrder.push(s); }
      byStage[s].push(m);
    });

    var html = '';
    stageOrder.forEach(function(stage) {
      html += '<div class="stage-header">' + stage + '</div><div class="match-grid">';
      byStage[stage].forEach(function(m) {
        var d = new Date(m.date);
        var dateStr = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
                    + ' · ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
        var pred = preds[m.id] || {};
        var isCompleted = m.status === 'completed';
        var isLive = m.status === 'live';

        var scoreRow, statusLine;

        if (isCompleted) {
          // Show actual score on left, predicted score on right, save disabled
          var predTxt = preds[m.id] ? 'Your prediction: ' + pred.home + ' – ' + pred.away : 'No prediction submitted';
          scoreRow = '<div class="score-row">'
            + '<input type="number" value="' + m.homeScore + '" disabled style="opacity:.7"/>'
            + '<span class="dash">–</span>'
            + '<input type="number" value="' + m.awayScore + '" disabled style="opacity:.7"/>'
            + '<button class="save-btn" disabled style="opacity:.4">Locked</button>'
            + '</div>';
          statusLine = '<div class="status-line" style="color:#aaa">' + predTxt + '</div>';
        } else if (isLive) {
          // Show 0-0 or current score, indicate live
          scoreRow = '<div class="score-row">'
            + '<input type="number" value="' + (m.homeScore !== null ? m.homeScore : 0) + '" disabled style="opacity:.7"/>'
            + '<span class="dash">–</span>'
            + '<input type="number" value="' + (m.awayScore !== null ? m.awayScore : 0) + '" disabled style="opacity:.7"/>'
            + '<button class="save-btn" disabled style="opacity:.4">Locked</button>'
            + '</div>';
          var livePredTxt = preds[m.id] ? 'Your prediction: ' + pred.home + ' – ' + pred.away : 'No prediction submitted';
          statusLine = '<div class="status-line"><span style="color:#f87171;font-weight:bold">● LIVE</span> &nbsp;' + livePredTxt + '</div>';
        } else {
          // Upcoming — editable
          var savedTxt = preds[m.id] ? '✓ ' + pred.home + ' – ' + pred.away : '';
          scoreRow = '<div class="score-row">'
            + '<input id="h_' + m.id + '" type="number" min="0" max="20" value="' + (pred.home !== undefined ? pred.home : '') + '" placeholder="0"/>'
            + '<span class="dash">–</span>'
            + '<input id="a_' + m.id + '" type="number" min="0" max="20" value="' + (pred.away !== undefined ? pred.away : '') + '" placeholder="0"/>'
            + '<button class="save-btn" onclick="savePred(\'' + m.id + '\',this)">Save</button>'
            + '</div>';
          statusLine = '<div id="status_' + m.id + '" class="status-line">' + savedTxt + '</div>';
        }

        html += '<div class="match-card">'
          + '<div class="match-meta">' + dateStr + (m.group ? ' · ' + m.group : '') + (isCompleted ? ' · <span style="color:#6ee7b7">Final</span>' : '') + '</div>'
          + '<div class="match-teams"><span class="team">' + m.home + '</span>'
          + '<span class="vs">vs</span><span class="team">' + m.away + '</span></div>'
          + scoreRow
          + statusLine
          + '</div>';
      });
      html += '</div>';
    });
    container.innerHTML = html;
  }

  function savePred(matchId, btn) {
    var h = parseInt(document.getElementById('h_' + matchId).value);
    var a = parseInt(document.getElementById('a_' + matchId).value);
    var statusEl = document.getElementById('status_' + matchId);
    if (isNaN(h) || isNaN(a)) {
      statusEl.className = 'status-line err';
      statusEl.textContent = 'Enter both scores.';
      return;
    }
    btn.disabled = true; btn.textContent = '…';
    google.script.run
      .withSuccessHandler(function() {
        btn.disabled = false; btn.textContent = 'Save';
        statusEl.className = 'status-line';
        statusEl.textContent = '✓ Saved: ' + h + ' – ' + a;
      })
      .withFailureHandler(function(e) {
        btn.disabled = false; btn.textContent = 'Save';
        statusEl.className = 'status-line err';
        statusEl.textContent = e.message;
      })
      .submitPrediction(participant.id, matchId, h, a);
  }

  function toggleBreakdown(id) {
    var row = document.getElementById(id);
    row.style.display = row.style.display === 'none' ? '' : 'none';
  }

  // ── Leaderboard ─────────────────────────────────────────────

  function populateGroupSelect() {
    var sel = document.getElementById('lbGroupSelect');
    participant.groups.forEach(function(g) {
      var opt = document.createElement('option');
      opt.value = g; opt.textContent = g;
      sel.appendChild(opt);
    });
    if (participant.groups.length > 0) sel.value = participant.groups[0];
    loadLeaderboard();
  }

  function loadLeaderboard() {
    var groupName = document.getElementById('lbGroupSelect').value || null;
    var isGlobal = !groupName;
    document.getElementById('lbLoading').classList.remove('hidden');
    document.getElementById('lbTable').classList.add('hidden');
    document.getElementById('lbEmpty').classList.add('hidden');
    lbLoaded = true;

    // Show/hide Groups column based on global vs group view
    document.getElementById('lbGroupsHeader').style.display = 'none';

    google.script.run
      .withSuccessHandler(function(rows) {
        document.getElementById('lbLoading').classList.add('hidden');
        if (!rows.length) {
          document.getElementById('lbEmpty').classList.remove('hidden');
          return;
        }
        var tbody = document.getElementById('lbBody');
        tbody.innerHTML = '';
        rows.forEach(function(r, idx) {
          var rankClass = r.rank === 1 ? 'rank-1' : r.rank === 2 ? 'rank-2' : r.rank === 3 ? 'rank-3' : '';
          var isMe = r.id === participant.id;
          var bdId = 'bd_' + idx;

          // Main row
          var tr = document.createElement('tr');
          if (isMe) tr.className = 'highlight-me';
          tr.innerHTML = '<td class="' + rankClass + '">' + r.rank + '</td>'
            + '<td><button class="lb-name-btn" onclick="toggleBreakdown(\'' + bdId + '\')">'
            + r.name + (isMe ? ' <span style="color:#f0c030;font-size:.75rem">(you)</span>' : '')
            + ' <span style="color:#555;font-size:.7rem">▾</span></button></td>'
            + '<td class="score-pts">' + r.score + '</td>';
          tbody.appendChild(tr);

          // Breakdown row (hidden by default)
          var bd = r.breakdown || {};
          var chips = '';
          if (bd.exactScore)     chips += '<span class="chip chip-exact">🎯 Exact score ×' + bd.exactScore + '</span>';
          if (bd.correctResult)  chips += '<span class="chip chip-result">✅ Correct result ×' + bd.correctResult + '</span>';
          if (bd.incorrect)      chips += '<span class="chip chip-wrong">❌ Wrong prediction ×' + bd.incorrect + '</span>';
          if (bd.noPrediction)   chips += '<span class="chip chip-miss">— No prediction ×' + bd.noPrediction + '</span>';
          if (!chips)            chips  = '<span class="chip chip-miss">No completed matches yet</span>';

          var trBd = document.createElement('tr');
          trBd.className = 'breakdown-row';
          trBd.id = bdId;
          trBd.style.display = 'none';
          trBd.innerHTML = '<td colspan="3"><div class="breakdown-chips">' + chips + '</div></td>';
          tbody.appendChild(trBd);
        });
        document.getElementById('lbTable').classList.remove('hidden');
      })
      .withFailureHandler(function(e) {
        document.getElementById('lbLoading').textContent = 'Error: ' + e.message;
      })
      .getLeaderboard(groupName, participant.id);
  }
</script>
</body>
</html>
